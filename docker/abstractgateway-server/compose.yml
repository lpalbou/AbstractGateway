name: abstractgateway-server

services:
  abstractgateway:
    image: ghcr.io/lpalbou/abstractgateway-server:${ABSTRACTGATEWAY_IMAGE_TAG:-0.2.3}
    build:
      context: ../..
      dockerfile: docker/abstractgateway-server/Dockerfile
      args:
        ABSTRACTGATEWAY_INSTALL_MODE: ${ABSTRACTGATEWAY_INSTALL_MODE:-pypi}
        ABSTRACTGATEWAY_VERSION: ${ABSTRACTGATEWAY_VERSION:-0.2.3}
    ports:
      - "${ABSTRACTGATEWAY_BIND_HOST:-127.0.0.1}:${ABSTRACTGATEWAY_PORT:-8080}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      ABSTRACTGATEWAY_AUTH_TOKEN: ${ABSTRACTGATEWAY_AUTH_TOKEN:?Set ABSTRACTGATEWAY_AUTH_TOKEN}
      ABSTRACTGATEWAY_ALLOWED_ORIGINS: ${ABSTRACTGATEWAY_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
      ABSTRACTGATEWAY_DATA_DIR: /data/gateway
      ABSTRACTGATEWAY_FLOWS_DIR: /data/flows
      ABSTRACTGATEWAY_WORKFLOW_SOURCE: ${ABSTRACTGATEWAY_WORKFLOW_SOURCE:-bundle}
      ABSTRACTGATEWAY_STORE_BACKEND: ${ABSTRACTGATEWAY_STORE_BACKEND:-file}
      ABSTRACTGATEWAY_DB_PATH: ${ABSTRACTGATEWAY_DB_PATH:-}
      ABSTRACTGATEWAY_RUNNER: ${ABSTRACTGATEWAY_RUNNER:-1}
      ABSTRACTGATEWAY_PROVIDER: ${ABSTRACTGATEWAY_PROVIDER:-}
      ABSTRACTGATEWAY_MODEL: ${ABSTRACTGATEWAY_MODEL:-}
      ABSTRACTGATEWAY_TOOL_MODE: ${ABSTRACTGATEWAY_TOOL_MODE:-approval}
      ABSTRACTGATEWAY_EMBEDDING_PROVIDER: ${ABSTRACTGATEWAY_EMBEDDING_PROVIDER:-disabled}
      ABSTRACTGATEWAY_EMBEDDING_MODEL: ${ABSTRACTGATEWAY_EMBEDDING_MODEL:-}
      ABSTRACTGATEWAY_WORKSPACE_DIR: /workspace
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-AbstractGateway}
      PORTKEY_API_KEY: ${PORTKEY_API_KEY:-}
      PORTKEY_CONFIG: ${PORTKEY_CONFIG:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      ABSTRACTVISION_BACKEND: ${ABSTRACTVISION_BACKEND:-openai}
      ABSTRACTVISION_BASE_URL: ${ABSTRACTVISION_BASE_URL:-}
      ABSTRACTVISION_API_KEY: ${ABSTRACTVISION_API_KEY:-}
      ABSTRACTVISION_MODEL_ID: ${ABSTRACTVISION_MODEL_ID:-}
      ABSTRACTVISION_TEXT_TO_VIDEO_PATH: ${ABSTRACTVISION_TEXT_TO_VIDEO_PATH:-}
      ABSTRACTVISION_IMAGE_TO_VIDEO_PATH: ${ABSTRACTVISION_IMAGE_TO_VIDEO_PATH:-}
      ABSTRACTVOICE_LANGUAGE: ${ABSTRACTVOICE_LANGUAGE:-en}
      ABSTRACTVOICE_ALLOW_DOWNLOADS: ${ABSTRACTVOICE_ALLOW_DOWNLOADS:-1}
      ABSTRACTVOICE_TTS_ENGINE: ${ABSTRACTVOICE_TTS_ENGINE:-auto}
      ABSTRACTVOICE_STT_ENGINE: ${ABSTRACTVOICE_STT_ENGINE:-auto}
      ABSTRACTVOICE_TTS_MODEL: ${ABSTRACTVOICE_TTS_MODEL:-}
      ABSTRACTVOICE_STT_MODEL: ${ABSTRACTVOICE_STT_MODEL:-}
      ABSTRACTVOICE_REMOTE_BASE_URL: ${ABSTRACTVOICE_REMOTE_BASE_URL:-}
      ABSTRACTVOICE_REMOTE_API_KEY: ${ABSTRACTVOICE_REMOTE_API_KEY:-}
      ABSTRACTVOICE_REMOTE_TIMEOUT_S: ${ABSTRACTVOICE_REMOTE_TIMEOUT_S:-}
      ABSTRACTCORE_SERVER_BASE_URL_ALLOWLIST: ${ABSTRACTCORE_SERVER_BASE_URL_ALLOWLIST:-}
      ABSTRACTCORE_SERVER_URL_FETCH_ALLOWLIST: ${ABSTRACTCORE_SERVER_URL_FETCH_ALLOWLIST:-}
      ABSTRACTCORE_SERVER_MEDIA_ROOT: ${ABSTRACTCORE_SERVER_MEDIA_ROOT:-/workspace}
      ABSTRACTCORE_SERVER_ALLOW_LOCAL_FILES: ${ABSTRACTCORE_SERVER_ALLOW_LOCAL_FILES:-0}
    volumes:
      - abstractgateway-data:/data/gateway
      - abstractgateway-workspace:/workspace
      - ${ABSTRACTGATEWAY_HOST_FLOWS_DIR:-../../flows/bundles}:/data/flows:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  abstractgateway-data:
  abstractgateway-workspace:
